model:
  endpoint: ${OPENCLAW_ENDPOINT}
  api_key: ${OPENCLAW_API_KEY}
  name: "openclaw-model"
  timeout: 120
  temperature: 0
  top_p: 1
  seed: null
  thinking:
    enabled: false
engine:
  concurrency: 5
  interval_ms: 200
  rate_limit_per_min: 120
  burst: 5
  max_retries: 3
  sample_size: null
  progress: true
  log_dir: "logs"
  alert_failure_rate: 0.3
  alert_consecutive_failures: 5
task: "multiturn_eval_v0.1"
database: "data/pipeline.db"
export:
  masking: true
  mask_fields: [phone, id_card, name, full_address]
